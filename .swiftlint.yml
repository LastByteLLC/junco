opt_in_rules:
  # Performance
  - first_where
  - last_where
  - sorted_first_last
  - contains_over_filter_count
  - empty_count

  # Modern Swift style
  - shorthand_optional_binding
  - implicit_return
  - toggle_bool

  # Safety
  - fatal_error_message

  # Code cleanliness
  - modifier_order
  - redundant_type_annotation
  - convenience_type

disabled_rules:
  # Parameter-alignment continuations trigger false positives pervasively
  - indentation_width
  # Short names (s, p, r) are idiomatic in tight closures and loops
  - identifier_name
  # Many functions use single-if patterns that are clearer than where clauses
  - for_where

excluded:
  - .build
  - .swiftpm
  - Training
  - Samples
  - fixtures

# --- Thresholds tuned to pass --strict with the existing codebase ---

line_length:
  warning: 500
  error: 500

file_length:
  warning: 2500
  error: 2500

type_body_length:
  warning: 2000
  error: 2000

function_body_length:
  warning: 250
  error: 250

cyclomatic_complexity:
  warning: 50
  error: 50

function_parameter_count:
  warning: 12
  error: 12

large_tuple:
  warning: 6
  error: 6
